# Global Macro Trading - Asset Configuration
# 금리: 국채선물 기준 (전체 통일)
# FX: 선물 기준 (KRW만 spot 유지)

rates:
  US:
    tickers:
      - TU1 Comdty   # 미국 2Y T-Note 선물
      - TY1 Comdty   # 미국 10Y T-Note 선물
    spreads:
      - [TU1 Comdty, TY1 Comdty]  # US 2s10s
  UK:
    tickers:
      - G 1 Comdty   # 영국 Gilt 선물
  Australia:
    tickers:
      - YM1 Comdty   # 호주 3Y Bond 선물
      - XM1 Comdty   # 호주 10Y Bond 선물
    spreads:
      - [YM1 Comdty, XM1 Comdty]
  Korea:
    tickers:
      - KE1 Comdty    # 한국 3Y 국채선물
      - KAA1 Comdty   # 한국 10Y 국채선물
    spreads:
      - [KE1 Comdty, KAA1 Comdty]  # KR 3s10s
  Germany:
    tickers:
      - DU1 Comdty   # 독일 2Y Schatz 선물
      - RX1 Comdty   # 독일 10Y Bund 선물
    spreads:
      - [DU1 Comdty, RX1 Comdty]
  France:
    tickers:
      - OAT1 Comdty  # 프랑스 OAT 선물
  Italy:
    tickers:
      - IK1 Comdty   # 이탈리아 BTP 선물
  Japan:
    tickers:
      - JB1 Comdty   # 일본 JGB 선물

fx:
  GBP:
    ticker: BP1 Curncy  # GBP 선물
  AUD:
    ticker: AD1 Curncy  # AUD 선물
  EUR:
    ticker: EC1 Curncy  # EUR 선물
  JPY:
    ticker: JY1 Curncy  # JPY 선물
  KRW:
    ticker: KRW Curncy  # 한국 원화 (spot 유지)

indices:
  Nasdaq:
    ticker: NQ1 Index

# Cross-asset relationships for spread indicators
cross_asset_pairs:
  rates_curves:
    - [TU1 Comdty, TY1 Comdty]              # US 2s10s
    - [DU1 Comdty, RX1 Comdty]              # DE 2s10s
    - [KE1 Comdty, KAA1 Comdty]             # KR 3s10s
    - [YM1 Comdty, XM1 Comdty]              # AU 3s10s

  rates_cross_country:
    - [TU1 Comdty, DU1 Comdty]              # US-DE 2Y spread
    - [TY1 Comdty, RX1 Comdty]              # US-DE 10Y spread
    - [TY1 Comdty, JB1 Comdty]              # US-JP 10Y spread
    - [TY1 Comdty, G 1 Comdty]              # US-UK 10Y spread

  rates_peripheral:
    - [IK1 Comdty, RX1 Comdty]              # Italy-Germany spread
    - [OAT1 Comdty, RX1 Comdty]             # France-Germany spread

  # NQ as a risk-sentiment LEAD for rates/FX lead_lag candidates.
  # NQ itself is never traded (discovery.exclude_assets blocks the
  # reverse direction); wrong-sign combos die at the Sharpe-3Y filter.
  equity_risk:
    - [NQ1 Index, AD1 Curncy]               # risk-on → AUD (commodity FX)
    - [NQ1 Index, KRW Curncy]               # risk-on → KRW (EM, equity-flow linked)
    - [NQ1 Index, JY1 Curncy]               # risk-off → JPY (safe haven)
    - [NQ1 Index, TY1 Comdty]               # flight-to-quality → US 10Y
    - [NQ1 Index, TU1 Comdty]               # flight-to-quality → US 2Y

# Cross-asset predictive pairs (Alpha2)
predictive_pairs:
  curve_to_fx:
    # US 2s10s curve → risk FX
    - short_rate: TU1 Comdty
      long_rate: TY1 Comdty
      targets:
        - AD1 Curncy    # AUD (commodity currency, risk-sensitive)
        - KRW Curncy    # KRW (EM, risk-sensitive)
        - EC1 Curncy    # EUR
    # DE 2s10s curve → EUR
    - short_rate: DU1 Comdty
      long_rate: RX1 Comdty
      targets:
        - EC1 Curncy
  rate_diff_to_fx:
    # US vs foreign rate differential → FX
    - us_rate: TY1 Comdty
      foreign_rate: RX1 Comdty
      target: EC1 Curncy
    - us_rate: TY1 Comdty
      foreign_rate: JB1 Comdty
      target: JY1 Curncy
    - us_rate: TY1 Comdty
      foreign_rate: G 1 Comdty
      target: BP1 Curncy
    - us_rate: TU1 Comdty
      foreign_rate: KE1 Comdty
      target: KRW Curncy
    - us_rate: TU1 Comdty
      foreign_rate: YM1 Comdty
      target: AD1 Curncy

# ─────────────────────────────────────────────────────────────────────────────
# Signal-only yield data (NOT traded). Feeds the Carry/Value sleeves in
# SleeveEngine. Execution/PnL stays on the futures above; these yields only
# drive signals. The engine falls back to price proxies if any are missing,
# so it is safe to add/verify incrementally.
#   ⚠️ Verify exact Bloomberg tickers against your terminal before pulling.
# ─────────────────────────────────────────────────────────────────────────────
signal_yields:
  # Each TRADED rates future → the govt yield (%) of its tenor.
  # Rates carry = cross-country yield level; Rates value = own-history reversal.
  tradeable_yield_map:
    TU1 Comdty:  USGG2YR Index     # US 2Y
    TY1 Comdty:  USGG10YR Index    # US 10Y
    DU1 Comdty:  GDBR2 Index       # Germany 2Y
    RX1 Comdty:  GDBR10 Index      # Germany 10Y
    G 1 Comdty:  GUKG10 Index      # UK 10Y
    OAT1 Comdty: GFRN10 Index      # France 10Y
    IK1 Comdty:  GBTPGR10 Index    # Italy 10Y
    JB1 Comdty:  GJGB10 Index      # Japan 10Y
    YM1 Comdty:  GTAUD3YR Corp     # Australia 3Y
    XM1 Comdty:  GTAUD10YR Corp    # Australia 10Y
    KE1 Comdty:  GVSK3YR Index     # Korea 3Y
    KAA1 Comdty: GVSK10YR Index    # Korea 10Y

  # Long-end futures → [short yield, own long yield] for carry/rolldown slope
  # (alpha4 rates_carry). FR/IT use the German 2Y as the euro funding anchor.
  curve_slope_map:
    TY1 Comdty:  [USGG2YR Index, USGG10YR Index]
    RX1 Comdty:  [GDBR2 Index, GDBR10 Index]
    G 1 Comdty:  [GUKG2 Index, GUKG10 Index]
    OAT1 Comdty: [GDBR2 Index, GFRN10 Index]
    IK1 Comdty:  [GDBR2 Index, GBTPGR10 Index]
    JB1 Comdty:  [GJGB2 Index, GJGB10 Index]
    XM1 Comdty:  [GTAUD2YR Corp, GTAUD10YR Corp]
    KAA1 Comdty: [GVSK3YR Index, GVSK10YR Index]

  # Each TRADED rates future → its country's 2Y (policy-proxy) yield.
  # alpha4 policy_momentum: 2Y falling = easing cycle → long duration.
  policy_rate_map:
    TU1 Comdty:  USGG2YR Index
    TY1 Comdty:  USGG2YR Index
    DU1 Comdty:  GDBR2 Index
    RX1 Comdty:  GDBR2 Index
    OAT1 Comdty: GDBR2 Index
    IK1 Comdty:  GDBR2 Index
    G 1 Comdty:  GUKG2 Index
    JB1 Comdty:  GJGB2 Index
    YM1 Comdty:  GTAUD2YR Corp
    XM1 Comdty:  GTAUD2YR Corp
    KE1 Comdty:  GVSK3YR Index
    KAA1 Comdty: GVSK3YR Index

  # Each TRADED FX future → its 2Y (short) govt yield. 'US' is the carry anchor.
  # FX carry = foreign 2Y − US 2Y (long high-yield currency).
  fx_short_yield:
    US:          USGG2YR Index     # anchor
    EC1 Curncy:  GDBR2 Index       # EUR ← Germany 2Y
    BP1 Curncy:  GUKG2 Index       # GBP ← UK 2Y
    AD1 Curncy:  GTAUD2YR Corp     # AUD ← Australia 2Y
    JY1 Curncy:  GJGB2 Index       # JPY ← Japan 2Y
    KRW Curncy:  GVSK3YR Index     # KRW ← Korea 3Y (shortest liquid)

# Carry trade pairs: [FX asset, US rate, Foreign rate]
carry_pairs:
  - fx: EC1 Curncy
    us_rate: TU1 Comdty
    foreign_rate: DU1 Comdty
  - fx: BP1 Curncy
    us_rate: TY1 Comdty
    foreign_rate: G 1 Comdty
  - fx: AD1 Curncy
    us_rate: TU1 Comdty
    foreign_rate: YM1 Comdty
  - fx: JY1 Curncy
    us_rate: TY1 Comdty
    foreign_rate: JB1 Comdty
  - fx: KRW Curncy
    us_rate: TU1 Comdty
    foreign_rate: KE1 Comdty
