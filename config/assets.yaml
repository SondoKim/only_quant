# Global Macro Trading - Asset Configuration
# 금리: 국채선물 기준 (전체 통일)
# FX: 선물 기준 (KRW만 spot 유지)

rates:
  US:
    tickers:
      - TU1 Comdty   # 미국 2Y T-Note 선물
      - TY1 Comdty   # 미국 10Y T-Note 선물
    spreads:
      - [TU1 Comdty, TY1 Comdty]  # US 2s10s
  UK:
    tickers:
      - G 1 Comdty   # 영국 Gilt 선물
  Australia:
    tickers:
      - YM1 Comdty   # 호주 3Y Bond 선물
      - XM1 Comdty   # 호주 10Y Bond 선물
    spreads:
      - [YM1 Comdty, XM1 Comdty]
  Korea:
    tickers:
      - KE1 Comdty    # 한국 3Y 국채선물
      - KAA1 Comdty   # 한국 10Y 국채선물
    spreads:
      - [KE1 Comdty, KAA1 Comdty]  # KR 3s10s
  Germany:
    tickers:
      - DU1 Comdty   # 독일 2Y Schatz 선물
      - RX1 Comdty   # 독일 10Y Bund 선물
    spreads:
      - [DU1 Comdty, RX1 Comdty]
  France:
    tickers:
      - OAT1 Comdty  # 프랑스 OAT 선물
  Italy:
    tickers:
      - IK1 Comdty   # 이탈리아 BTP 선물
  Japan:
    tickers:
      - JB1 Comdty   # 일본 JGB 선물

fx:
  GBP:
    ticker: BP1 Curncy  # GBP 선물
  AUD:
    ticker: AD1 Curncy  # AUD 선물
  EUR:
    ticker: EC1 Curncy  # EUR 선물
  JPY:
    ticker: JY1 Curncy  # JPY 선물
  KRW:
    ticker: KRW Curncy  # 한국 원화 (spot 유지)

indices:
  Nasdaq:
    ticker: NQ1 Index

# Cross-asset relationships for spread indicators
cross_asset_pairs:
  rates_curves:
    - [TU1 Comdty, TY1 Comdty]              # US 2s10s
    - [DU1 Comdty, RX1 Comdty]              # DE 2s10s
    - [KE1 Comdty, KAA1 Comdty]             # KR 3s10s
    - [YM1 Comdty, XM1 Comdty]              # AU 3s10s

  rates_cross_country:
    - [TU1 Comdty, DU1 Comdty]              # US-DE 2Y spread
    - [TY1 Comdty, RX1 Comdty]              # US-DE 10Y spread
    - [TY1 Comdty, JB1 Comdty]              # US-JP 10Y spread
    - [TY1 Comdty, G 1 Comdty]              # US-UK 10Y spread

  rates_peripheral:
    - [IK1 Comdty, RX1 Comdty]              # Italy-Germany spread
    - [OAT1 Comdty, RX1 Comdty]             # France-Germany spread

# Cross-asset predictive pairs (Alpha2)
predictive_pairs:
  curve_to_fx:
    # US 2s10s curve → risk FX
    - short_rate: TU1 Comdty
      long_rate: TY1 Comdty
      targets:
        - AD1 Curncy    # AUD (commodity currency, risk-sensitive)
        - KRW Curncy    # KRW (EM, risk-sensitive)
        - EC1 Curncy    # EUR
    # DE 2s10s curve → EUR
    - short_rate: DU1 Comdty
      long_rate: RX1 Comdty
      targets:
        - EC1 Curncy
  rate_diff_to_fx:
    # US vs foreign rate differential → FX
    - us_rate: TY1 Comdty
      foreign_rate: RX1 Comdty
      target: EC1 Curncy
    - us_rate: TY1 Comdty
      foreign_rate: JB1 Comdty
      target: JY1 Curncy
    - us_rate: TY1 Comdty
      foreign_rate: G 1 Comdty
      target: BP1 Curncy
    - us_rate: TU1 Comdty
      foreign_rate: KE1 Comdty
      target: KRW Curncy
    - us_rate: TU1 Comdty
      foreign_rate: YM1 Comdty
      target: AD1 Curncy

# Carry trade pairs: [FX asset, US rate, Foreign rate]
carry_pairs:
  - fx: EC1 Curncy
    us_rate: TU1 Comdty
    foreign_rate: DU1 Comdty
  - fx: BP1 Curncy
    us_rate: TY1 Comdty
    foreign_rate: G 1 Comdty
  - fx: AD1 Curncy
    us_rate: TU1 Comdty
    foreign_rate: YM1 Comdty
  - fx: JY1 Curncy
    us_rate: TY1 Comdty
    foreign_rate: JB1 Comdty
  - fx: KRW Curncy
    us_rate: TU1 Comdty
    foreign_rate: KE1 Comdty
