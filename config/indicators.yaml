# ───────────────────────────────────────────────────────────────────────────
# Discovery scope — which strategy CATEGORIES the factory generates/uses.
# Categories: momentum, mean_reversion, advanced, alpha
#
# Naive single-asset technicals (momentum: MA/EMA/RSI/MACD/breakout;
# mean_reversion: Z-score/Bollinger) are data-mining-prone and in 2022-26
# backtests contributed ~0 (momentum) and net-negative (mean_reversion, fx
# -20). The structured cross-asset signals (advanced filtered/multi-TF
# momentum, alpha cross-sectional/curve) carry the real PnL → keep only those.
#
# Drives BOTH the generator (future discovery) AND the selector (which active
# strategies are used now — takes effect immediately, even on existing DBs).
# Set to [momentum, mean_reversion, advanced, alpha] to restore the old behavior.
# ───────────────────────────────────────────────────────────────────────────
discovery:
  enabled_categories: [advanced, alpha]
  # Assets removed from strategy search AND backtesting entirely
  # (2026-06-10: Nasdaq dropped from the strategy universe by decision;
  # its prices remain available as an input/related signal).
  exclude_assets: ["NQ1 Index"]
  # Strategy archetypes no longer searched — persistent post-discovery
  # underperformance across 53 monthly DBs (avg 6M Sharpe of stored
  # strategies: adx_momentum 0.14, carry_trade 0.36 vs ~1.0 for others).
  disabled_strategies: [adx_momentum, carry_trade]

backtest:
  max_drawdown: -0.25
  min_trades: 20
  sharpe_threshold_3y: 0.8
  sortino_threshold_3y: 0.8
  trail_stop_pct: 0.02
  max_hold_days: 60
  transaction_cost_bps: 0
  # Alpha3: Regime filter (applied in selector, not as a strategy type)
  # Set via --regime-filter CLI flag. Parameters below are defaults.
  regime_adx_period: 14
  regime_adx_threshold: 25

  # ──────────────────────────────────────────────────────────────────────
  # Rates-specific improvements (all toggleable for A/B backtesting).
  # Defaults below = IMPROVED behavior. To restore legacy behavior, see the
  # "legacy:" note on each line.
  # ──────────────────────────────────────────────────────────────────────
  rates_improvements:
    # #1: Legacy yield-era sign flip applied to ADVANCED strategies on rates.
    #     Now that rates are bond FUTURES (price, not yield), this flip is
    #     almost certainly stale and inverts good signals.  legacy: true
    rates_adv_invert: false

    # #3: Inverse-volatility position sizing (risk parity across assets).
    #     Scales each asset's position by (vol_target / realized_vol) so that
    #     low-vol rates are not drowned out by high-vol FX/equity.  legacy: false
    inverse_vol_sizing: true
    vol_target_annual: 0.10   # target annualized vol per asset
    vol_lookback: 60          # trading days for realized-vol estimate
    vol_scale_min: 0.25       # floor on the inverse-vol multiplier
    vol_scale_max: 3.0        # cap on the inverse-vol multiplier

    # #4: Treat ALL rates tickers as ONE correlation group instead of
    #     per-country, so the selector cannot stack the same global-duration
    #     bet (US long + DE long + UK long ...) as if it were diversified.
    #     legacy: false
    rates_global_corr_group: true

    # #5b: Extra weight multiplier for carry/curve (alpha1/alpha2) strategies
    #      on rates during sharpe-weighted aggregation. Rates alpha is mostly
    #      carry + curve, so up-weight it vs weak price technicals.
    #      1.0 = no boost (legacy).  >1.0 = favor alpha sleeves on rates.
    rates_alpha_weight_boost: 2.0

  # #5a: Asset-class differentiated discovery thresholds. If an asset class
  #      appears here, its values override the global thresholds above during
  #      _process_batch storage filtering. Omit a class to use globals.
  #      Default mirrors globals (neutral) — tune per class after backtesting.
  asset_class_thresholds:
    rates:
      sharpe_threshold_3y: 0.8
      sortino_threshold_3y: 0.8
      min_trades: 20
      max_drawdown: -0.25
