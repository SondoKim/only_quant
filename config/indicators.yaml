  # Alpha1: Cross-Sectional Factor
  xsect_momentum:
    period:
    - 3       # 단기 포지셔닝 변화
    - 5
    - 10
    - 20
    - 60      # 3개월 모멘텀 (학술적 표준)
    top_n:
    - 1       # 최고 집중 베팅
    - 2
    - 3
    universe:
    - rates
    - fx
  xsect_carry:
    period:
    - 5       # 빠른 캐리 시그널
    - 10
    - 20
    - 30      # 느린 구조적 캐리
    top_n:
    - 1
    - 2
  # Alpha4: Yield-based Carry / Value (2026-06-10) — uses signal_yields panel.
  # rates_carry: curve slope (10Y−2Y) as carry+rolldown proxy for long-end futures
  rates_carry:
    threshold:   # slope(%) entry level
    - 0.0
    - 0.25
    - 0.5
    smooth:      # slope smoothing (days)
    - 5
    - 20
  # rates_value: own yield z-score vs trailing history → mean reversion
  rates_value:
    lookback:    # trading days
    - 252
    - 504
    entry_z:
    - 1.0
    - 1.5
  # real_rate_fx: actual 2Y yield differential momentum → FX direction
  real_rate_fx:
    period:      # differential change lookback (days)
    - 20
    - 60
  # policy_momentum: country 2Y yield change = CB cycle direction → duration
  policy_momentum:
    period:      # yield change lookback (days)
    - 20
    - 60
    - 120
  # month_end_seasonal: bond index duration-extension buying into month-end
  month_end_seasonal:
    days_before: # enter N business days before month-end, exit at month turn
    - 3
    - 5
  # Alpha2: Cross-Asset Predictive
  curve_to_fx:
    period:
    - 5       # 전술적 커브 변화
    - 10
    - 20
    - 60      # 구조적 커브 변화
    threshold:
    - 0.3     # 민감한 진입
    - 0.5
    - 1.0
    - 1.5
    - 2.0     # 고확신 진입
  rate_diff_to_fx:
    period:
    - 3       # 단기 금리차 모멘텀
    - 5
    - 10
    - 20
    threshold:
    - 0.3     # 민감한 진입
    - 0.5
    - 1.0
    - 1.5
  # Alpha3 (Regime-Adaptive) is implemented as a meta-filter in selector.py
  # Configure via backtest section: regime_filter, regime_adx_period, regime_adx_threshold
# ───────────────────────────────────────────────────────────────────────────
# Discovery scope — which strategy CATEGORIES the factory generates/uses.
# Categories: momentum, mean_reversion, advanced, alpha
#
# Naive single-asset technicals (momentum: MA/EMA/RSI/MACD/breakout;
# mean_reversion: Z-score/Bollinger) are data-mining-prone and in 2022-26
# backtests contributed ~0 (momentum) and net-negative (mean_reversion, fx
# -20). The structured cross-asset signals (advanced filtered/multi-TF
# momentum, alpha cross-sectional/curve) carry the real PnL → keep only those.
#
# Drives BOTH the generator (future discovery) AND the selector (which active
# strategies are used now — takes effect immediately, even on existing DBs).
# Set to [momentum, mean_reversion, advanced, alpha] to restore the old behavior.
# ───────────────────────────────────────────────────────────────────────────
discovery:
  enabled_categories: [advanced, alpha]
  # Assets removed from strategy search AND backtesting entirely
  # (2026-06-10: Nasdaq dropped from the strategy universe by decision;
  # its prices remain available as an input/related signal).
  exclude_assets: ["NQ1 Index"]
  # Strategy archetypes no longer searched — persistent post-discovery
  # underperformance across 53 monthly DBs (avg 6M Sharpe of stored
  # strategies: adx_momentum 0.14, carry_trade 0.36 vs ~1.0 for others).
  # rates_carry + rates_value added 2026-06-10 after forward A/B validation:
  # both dragged portfolio rates SR 1.42→~1.05 despite good-looking trailing
  # stats (rates_value stored avg 6M Sharpe 1.20 — but forward it fights yield
  # trends with a 2× alpha boost). policy_momentum covers the rates-macro
  # factor better (1.20 avg, no SR drag).
  # volatility_breakout added 2026-06-15: fx-advanced 셀 forward 음수(-0.47/-0.16,
  # 2026-06-11 정직 감사)라 이미 enabled_cells 로 제외돼 있었으나, 탐색/저장 단계에서도
  # 완전히 차단하려고 이름으로 disable (자산군 무관 전면 차단).
  disabled_strategies: [adx_momentum, carry_trade, rates_carry, rates_value, volatility_breakout]
  # 2026-06-11 honest-execution audit (signal_lag=1, same-bar look-ahead
  # removed): only asset-class × category cells whose equal-weight strategy
  # PnL had positive Sharpe in BOTH halves of 2016-2026 stay tradeable.
  #   fx-alpha1 0.93/0.96, fx-alpha4 0.63/0.42, rates-advanced 0.17/0.70.
  # Dropped: fx-advanced (-0.47/-0.16), rates-alpha1 (-0.58/0.00),
  # alpha2 (-0.51/+0.24 unstable), rates-alpha4 (-0.12/-0.05).
  # Remove a class from this map to allow ALL categories on it again;
  # delete the whole key to disable cell filtering.
  # 2026-06-11 PM: rates removed from the FACTORY entirely — the live rates
  # book now comes from the SleeveEngine (main._merge_sleeve_rates; honest SR
  # 0.31 full / 0.58 since 2016 vs factory rates ~0 net of costs). The factory
  # is the FX specialist. Re-add `rates: [advanced]` here to restore the old
  # factory rates book.
  enabled_cells:
    fx: [alpha1, alpha4]
  # Ensemble mode (2026-06-10): relax the 3Y storage gates and shrink
  # Sharpe weights toward equal-weight — more, smaller bets instead of a
  # concentrated book. A/B-validate before enabling permanently.
  ensemble:
    enabled: true
    sharpe_threshold_3y: 0.5
    sortino_threshold_3y: 0.5
    # 1.0 = full equal-weight across active strategies (2026-06-11: trailing
    # sharpe_6m weighting showed no forward edge at signal_lag=1; equal weight
    # lifted honest fx SR 0.85→0.91).
    weight_shrinkage: 1.0

backtest:
  max_drawdown: -0.25
  min_trades: 20
  # Slow structural strategies (rates_carry, rates_value) trade 1-5×/window
  # by design — they get this lower trade-count floor instead.
  min_trades_slow: 4
  sharpe_threshold_3y: 0.8
  sortino_threshold_3y: 0.8
  trail_stop_pct: 0.02
  max_hold_days: 60
  # 2026-06-10: 0 → 2bp. Applied BOTH in discovery metrics (engine) and the
  # Phase 2 simulation (charged on |Δposition| turnover) so fast strategies
  # are no longer flattered by free trading.
  transaction_cost_bps: 2
  # Alpha3: Regime filter (applied in selector, not as a strategy type)
  # Set via --regime-filter CLI flag. Parameters below are defaults.
  regime_adx_period: 14
  regime_adx_threshold: 25

  # ──────────────────────────────────────────────────────────────────────
  # Rates-specific improvements (all toggleable for A/B backtesting).
  # Defaults below = IMPROVED behavior. To restore legacy behavior, see the
  # "legacy:" note on each line.
  # ──────────────────────────────────────────────────────────────────────
  rates_improvements:
    # #1: Legacy yield-era sign flip applied to ADVANCED strategies on rates.
    #     Now that rates are bond FUTURES (price, not yield), this flip is
    #     almost certainly stale and inverts good signals.  legacy: true
    rates_adv_invert: false

    # #3: Inverse-volatility position sizing (risk parity across assets).
    #     Scales each asset's position by (vol_target / realized_vol) so that
    #     low-vol rates are not drowned out by high-vol FX/equity.  legacy: false
    inverse_vol_sizing: true
    vol_target_annual: 0.10   # target annualized vol per asset
    vol_lookback: 60          # trading days for realized-vol estimate
    vol_scale_min: 0.25       # floor on the inverse-vol multiplier
    vol_scale_max: 3.0        # cap on the inverse-vol multiplier

    # #4: Treat ALL rates tickers as ONE correlation group instead of
    #     per-country, so the selector cannot stack the same global-duration
    #     bet (US long + DE long + UK long ...) as if it were diversified.
    #     legacy: false
    rates_global_corr_group: true

    # #5b: Extra weight multiplier for carry/curve (alpha1/alpha2) strategies
    #      on rates during sharpe-weighted aggregation. Rates alpha is mostly
    #      carry + curve, so up-weight it vs weak price technicals.
    #      1.0 = no boost (legacy).  >1.0 = favor alpha sleeves on rates.
    rates_alpha_weight_boost: 2.0

  # #5a: Asset-class differentiated discovery thresholds. If an asset class
  #      appears here, its values override the global thresholds above during
  #      _process_batch storage filtering. Omit a class to use globals.
  #      Default mirrors globals (neutral) — tune per class after backtesting.
  asset_class_thresholds:
    rates:
      sharpe_threshold_3y: 0.8
      sortino_threshold_3y: 0.8
      min_trades: 20
      max_drawdown: -0.25
